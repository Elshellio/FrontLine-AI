<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Frontline AI Demo Scene Admin</title>
<style>
:root{
  --bg:#07111f;
  --panel:#101b2c;
  --panel2:#0c1728;
  --line:rgba(255,255,255,.13);
  --gold:#e4c764;
  --text:#f7f1dc;
  --muted:#aebbd0;
  --green:#7ee0ae;
  --red:#ff8b8b;
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top left,#12233d 0,#07111f 42%,#040913 100%);color:var(--text)}
main{max-width:1380px;margin:0 auto;padding:28px 28px 90px}
.topbar{position:sticky;top:0;z-index:20;margin:-28px -28px 24px;padding:18px 28px;background:rgba(7,17,31,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);display:flex;gap:16px;align-items:center;justify-content:space-between}
h1{margin:0;font-size:30px;letter-spacing:.2px}
.topbar p{margin:5px 0 0;color:var(--muted);font-size:14px}
.actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
button,.pill,a.button{border:1px solid rgba(228,199,100,.35);border-radius:999px;background:rgba(228,199,100,.12);color:var(--gold);padding:10px 15px;font-weight:900;cursor:pointer;text-decoration:none;font-size:13px}
button.primary{background:var(--gold);color:#07111f;border-color:var(--gold)}
button.ghost{background:rgba(255,255,255,.05);color:var(--text);border-color:var(--line)}
button:hover,a.button:hover{filter:brightness(1.08)}
.filters{display:flex;gap:8px;margin:0 0 18px;flex-wrap:wrap}
.filters button.active{background:var(--gold);color:#07111f;border-color:var(--gold)}
.group{margin:18px 0 28px}
.groupTitle{display:flex;align-items:center;justify-content:space-between;margin:0 0 12px}
.groupTitle h2{margin:0;color:var(--gold);font-size:22px}
.groupTitle small{color:var(--muted)}
.scene{border:1px solid var(--line);border-radius:20px;background:linear-gradient(180deg,rgba(255,255,255,.075),rgba(255,255,255,.035));box-shadow:0 20px 60px rgba(0,0,0,.18);margin:12px 0;overflow:hidden}
.sceneHead{display:grid;grid-template-columns:auto 1fr auto auto;gap:14px;align-items:center;padding:14px 16px;cursor:pointer}
.num{width:34px;height:34px;border-radius:999px;background:rgba(228,199,100,.16);color:var(--gold);display:grid;place-items:center;font-weight:900;border:1px solid rgba(228,199,100,.25)}
.sceneName{font-weight:900;font-size:16px}
.sceneMeta{color:var(--muted);font-size:12px;margin-top:3px}
.thumb{width:70px;height:50px;border-radius:12px;background:#050b14;border:1px solid var(--line);object-fit:cover}
.chev{color:var(--gold);font-size:20px}
.sceneBody{display:none;border-top:1px solid var(--line);padding:18px}
.scene.open .sceneBody{display:block}
.editor{display:grid;grid-template-columns:minmax(0,1fr) 390px;gap:18px}
.card{background:rgba(0,0,0,.18);border:1px solid var(--line);border-radius:18px;padding:16px}
.card h3{margin:0 0 14px;color:var(--gold);font-size:16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.full{grid-column:1/-1}
label{display:block;color:var(--muted);font-size:12px;font-weight:900;margin:0 0 6px}
input,textarea{width:100%;border-radius:12px;border:1px solid rgba(255,255,255,.16);background:#071426;color:white;padding:11px 12px;font:inherit;outline:none}
textarea{min-height:86px;resize:vertical}
input:focus,textarea:focus{border-color:rgba(228,199,100,.7);box-shadow:0 0 0 3px rgba(228,199,100,.12)}
.mediaBox{display:grid;gap:12px}
.previewWrap{position:relative;width:100%;aspect-ratio:1/1;border-radius:18px;background:#050b14;border:1px solid var(--line);overflow:hidden;display:grid;place-items:center}
.previewWrap img,.previewWrap video{width:100%;height:100%;object-fit:cover;transform:scale(var(--z,1));transition:.2s}
.previewWrap .presenter{position:absolute;right:14px;bottom:14px;width:92px;height:92px;border-radius:999px;border:3px solid var(--gold);overflow:hidden;background:#07111f;box-shadow:0 16px 40px rgba(0,0,0,.45)}
.previewWrap .presenter img{width:100%;height:100%;object-fit:cover;transform:none}
.emptyPreview{color:var(--muted);font-size:13px}
.fileRow{display:grid;grid-template-columns:1fr;gap:8px}
input[type=file]{font-size:12px;padding:9px}
.zoomRow{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center}
input[type=range]{accent-color:var(--gold)}
.status{position:fixed;right:24px;bottom:24px;z-index:50;min-width:180px;border:1px solid var(--line);border-radius:999px;padding:12px 16px;background:rgba(7,17,31,.94);box-shadow:0 20px 60px rgba(0,0,0,.35);color:var(--green);font-weight:900}
.hidden{display:none!important}
@media(max-width:980px){
  main{padding:18px 14px 90px}
  .topbar{margin:-18px -14px 18px;padding:14px;display:block}
  .actions{justify-content:flex-start;margin-top:12px}
  .sceneHead{grid-template-columns:auto 1fr auto}
  .thumb{display:none}
  .editor{grid-template-columns:1fr}
  .grid2{grid-template-columns:1fr}
}
</style>
</head>
<body>
<main>
  <div class="topbar">
    <div>
      <h1>Demo scene admin</h1>
      <p>Edit each demo scene. Text, media, presenter cut-out and zoom save into the live preview.</p>
    </div>
    <div class="actions">
      <button class="ghost" id="expandAllBtn">Expand all</button>
      <button class="ghost" id="collapseAllBtn">Collapse all</button>
      <a class="button" href="/advertising/frontline-ai-demo-videos.html" target="_blank">Open preview</a>
      <button class="primary" id="saveBtn">Save all</button>
    </div>
  </div>

  <div class="filters">
    <button class="active" data-filter="all">All scenes</button>
    <button data-filter="who">Video 1 · Who is it for?</button>
    <button data-filter="how">Video 2 · How does it work?</button>
  </div>

  <div id="admin"></div>
</main>
<div id="status" class="status">Ready</div>

<script>
/* FRONTLINE_DEMO_ADMIN_ACCORDION_EDITOR_V1 */
var media={who:[],how:[]};
var activeFilter="all";

var defaults={
  who:["Service businesses","Busy teams","Appointment-based services","Trades and field-service firms","Professional service businesses","Local firms with manual follow-up","Businesses ready to automate first response"],
  how:["Customer calls or sends an enquiry","Frontline AI answers instantly","It understands what they need","It captures the right details","It offers a callback or appointment","It sends confirmation","It alerts the right person","The lead is saved for follow-up"]
};

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function setStatus(msg,bad){status.textContent=msg;status.style.color=bad?"var(--red)":"var(--green)"}
function ensure(){
  ["who","how"].forEach(function(group){
    if(!Array.isArray(media[group]))media[group]=[];
    defaults[group].forEach(function(label,i){
      if(!media[group][i])media[group][i]={};
      if(!media[group][i].label)media[group][i].label=label;
      if(!Array.isArray(media[group][i].cards))media[group][i].cards=["","","",""];
      if(!media[group][i].zoom)media[group][i].zoom=1;
    });
  });
}
function mediaPreview(item){
  var url=String(item.media||"");
  var presenter=String(item.presenter||"");
  var zoom=Number(item.zoom||1);
  var html='<div class="previewWrap" style="--z:'+zoom+'">';
  if(!url){html+='<div class="emptyPreview">No media selected</div>'}
  else if(/\.(mp4|webm|mov|m4v)(\?|$)/i.test(url)){html+='<video src="'+esc(url)+'" muted playsinline controls></video>'}
  else{html+='<img src="'+esc(url)+'" alt="">'}
  if(presenter){html+='<div class="presenter"><img src="'+esc(presenter)+'" alt=""></div>'}
  html+='</div>';
  return html;
}
function thumb(item){
  var url=String(item.media||"");
  if(!url)return '<div class="thumb"></div>';
  if(/\.(mp4|webm|mov|m4v)(\?|$)/i.test(url))return '<video class="thumb" src="'+esc(url)+'" muted playsinline></video>';
  return '<img class="thumb" src="'+esc(url)+'" alt="">';
}
function field(group,i,key,label,value,area){
  var tag=area?"textarea":"input";
  var close=area?'</textarea>':'';
  var val=area?esc(value||''):'value="'+esc(value||'')+'"';
  return '<div class="'+(area?'full':'')+'"><label>'+label+'</label><'+tag+' data-kind="text" data-field="'+key+'" data-group="'+group+'" data-index="'+i+'" '+val+'>'+close+'</div>';
}
function card(group,i,c,value){
  return '<div><label>Small card '+(c+1)+'</label><input data-kind="card" data-card="'+c+'" data-group="'+group+'" data-index="'+i+'" value="'+esc(value||'')+'" placeholder="Label | Value"></div>';
}
function sceneHtml(group,item,i){
  var open=i===0?' open':'';
  var label=item.label||defaults[group][i]||("Scene "+(i+1));
  var zoom=Number(item.zoom||1);
  if(!Array.isArray(item.cards))item.cards=["","","",""];
  var html='<div class="scene'+open+'" data-group="'+group+'">';
  html+='<div class="sceneHead" onclick="toggleScene(this)">';
  html+='<div class="num">'+(i+1)+'</div>';
  html+='<div><div class="sceneName">'+esc(label)+'</div><div class="sceneMeta">'+(item.media?'Media set':'No media')+' · Zoom '+zoom.toFixed(2)+'</div></div>';
  html+=thumb(item);
  html+='<div class="chev">▾</div>';
  html+='</div>';
  html+='<div class="sceneBody"><div class="editor">';
  html+='<div class="card"><h3>Text</h3><div class="grid2">';
  html+=field(group,i,"label","Checklist label",item.label,false);
  html+=field(group,i,"kicker","Kicker",item.kicker,false);
  html+=field(group,i,"presenter_text","Presenter / top text",item.presenter_text,true);
  html+=field(group,i,"headline","Main headline",item.headline,true);
  html+=field(group,i,"body","Body copy",item.body,true);
  html+=card(group,i,0,item.cards[0])+card(group,i,1,item.cards[1])+card(group,i,2,item.cards[2])+card(group,i,3,item.cards[3]);
  html+='</div></div>';
  html+='<div class="card mediaBox"><h3>Media & preview</h3>';
  html+=mediaPreview(item);
  html+='<div class="fileRow"><label>Main image/video URL</label><input data-kind="url" data-group="'+group+'" data-index="'+i+'" value="'+esc(item.media||'')+'" placeholder="/assets/demo-video-media/example.png"><input data-kind="file" data-field="media" data-group="'+group+'" data-index="'+i+'" type="file" accept="video/mp4,video/webm,video/quicktime,image/png,image/jpeg,image/webp"></div>';
  html+='<div class="fileRow"><label>Presenter cut-out URL</label><input data-kind="presenterUrl" data-group="'+group+'" data-index="'+i+'" value="'+esc(item.presenter||'')+'" placeholder="/assets/demo-video-media/presenter.png"><input data-kind="file" data-field="presenter" data-group="'+group+'" data-index="'+i+'" type="file" accept="image/png,image/jpeg,image/webp"></div>';
  html+='<div class="zoomRow"><input data-kind="zoom" data-group="'+group+'" data-index="'+i+'" type="range" min="1" max="1.35" step="0.01" value="'+zoom+'"><strong>'+zoom.toFixed(2)+'</strong></div>';
  html+='</div></div></div></div>';
  return html;
}
function render(){
  ensure();
  var html="";
  [["who","Video 1 · Who is it for?"],["how","Video 2 · How does it work?"]].forEach(function(pair){
    var group=pair[0],title=pair[1];
    var hidden=activeFilter!=="all"&&activeFilter!==group?' hidden':'';
    html+='<section class="group'+hidden+'" data-group="'+group+'"><div class="groupTitle"><h2>'+title+'</h2><small>'+media[group].length+' scenes</small></div>';
    media[group].forEach(function(item,i){html+=sceneHtml(group,item,i)});
    html+='</section>';
  });
  admin.innerHTML=html;
  bindInputs();
}
function toggleScene(head){head.parentNode.classList.toggle("open")}
function bindInputs(){
  document.querySelectorAll("input[data-kind=text],textarea[data-kind=text]").forEach(function(input){
    input.oninput=function(){media[input.dataset.group][Number(input.dataset.index)][input.dataset.field]=input.value;};
  });
  document.querySelectorAll("input[data-kind=card]").forEach(function(input){
    input.oninput=function(){
      var item=media[input.dataset.group][Number(input.dataset.index)];
      if(!Array.isArray(item.cards))item.cards=["","","",""];
      item.cards[Number(input.dataset.card)]=input.value;
    };
  });
  document.querySelectorAll("input[data-kind=url]").forEach(function(input){
    input.oninput=function(){media[input.dataset.group][Number(input.dataset.index)].media=input.value.trim();};
  });
  document.querySelectorAll("input[data-kind=presenterUrl]").forEach(function(input){
    input.oninput=function(){media[input.dataset.group][Number(input.dataset.index)].presenter=input.value.trim();};
  });
  document.querySelectorAll("input[data-kind=zoom]").forEach(function(input){
    input.oninput=function(){media[input.dataset.group][Number(input.dataset.index)].zoom=Number(input.value);render();};
  });
  document.querySelectorAll("input[data-kind=file]").forEach(function(input){
    input.onchange=function(){
      var file=input.files&&input.files[0];
      if(!file)return;
      setStatus("Uploading "+file.name+"...");
      var reader=new FileReader();
      reader.onload=function(){
        fetch("/api/demo-video-media-upload",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({filename:file.name,base64:reader.result})})
          .then(function(r){return r.json()})
          .then(function(j){
            if(!j.ok)throw new Error((j.errors&&j.errors[0])||"Upload failed");
            media[input.dataset.group][Number(input.dataset.index)][input.dataset.field]=j.url;
            setStatus("Uploaded. Click Save all.");
            render();
          })
          .catch(function(e){setStatus(e.message||"Upload failed",true);});
      };
      reader.readAsDataURL(file);
    };
  });
}
function collect(){
  document.querySelectorAll("input[data-kind=text],textarea[data-kind=text]").forEach(function(input){media[input.dataset.group][Number(input.dataset.index)][input.dataset.field]=input.value;});
  document.querySelectorAll("input[data-kind=card]").forEach(function(input){
    var item=media[input.dataset.group][Number(input.dataset.index)];
    if(!Array.isArray(item.cards))item.cards=["","","",""];
    item.cards[Number(input.dataset.card)]=input.value;
  });
  document.querySelectorAll("input[data-kind=url]").forEach(function(input){media[input.dataset.group][Number(input.dataset.index)].media=input.value.trim();});
  document.querySelectorAll("input[data-kind=presenterUrl]").forEach(function(input){media[input.dataset.group][Number(input.dataset.index)].presenter=input.value.trim();});
  document.querySelectorAll("input[data-kind=zoom]").forEach(function(input){media[input.dataset.group][Number(input.dataset.index)].zoom=Number(input.value);});
}
document.querySelectorAll(".filters button").forEach(function(btn){
  btn.onclick=function(){
    document.querySelectorAll(".filters button").forEach(function(b){b.classList.remove("active")});
    btn.classList.add("active");
    activeFilter=btn.dataset.filter;
    render();
  };
});
expandAllBtn.onclick=function(){document.querySelectorAll(".scene").forEach(function(x){x.classList.add("open")})};
collapseAllBtn.onclick=function(){document.querySelectorAll(".scene").forEach(function(x){x.classList.remove("open")})};
saveBtn.onclick=function(){
  collect();
  setStatus("Saving...");
  fetch("/api/demo-video-media",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({media:media})})
    .then(function(r){return r.json()})
    .then(function(j){
      if(!j.ok)throw new Error("Save failed");
      media=j.media||media;
      setStatus("Saved.");
      render();
    })
    .catch(function(e){setStatus(e.message||"Save failed",true);});
};
fetch("/api/demo-video-media").then(function(r){return r.json()}).then(function(j){
  media=j.media||media;
  ensure();
  render();
  setStatus("Ready");
}).catch(function(){ensure();render();setStatus("Could not load saved media",true)});
</script>
</body>
</html>
